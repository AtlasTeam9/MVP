services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS-}
    init: true
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - "${BACKEND_DATA_DIR:-./data}:/app/data"
    restart: unless-stopped
