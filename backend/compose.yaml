services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS-}
    init: true
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_sessions:/app/data/sessions
    restart: unless-stopped

volumes:
  backend_sessions:
